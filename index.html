<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Luann Pereira Mendes</title>
</head>

<body>
    <div class="screen">
        <div class="ball-1"></div>
        <div class="ball-2"></div>
        <main class="card">
            <header class="card-header">
                <img src="https://avatars.githubusercontent.com/u/133384636?s=400&u=a15738784e837b8f0c02618aa1fd9670f72adaea&v=4"
                    alt="Foto de Luann Pereira Mendes" class="profile-photo">
                <h1 class="person-name">Luann Pereira Mendes</h1>
                <p class="person-desc">Let's connect and explore how we can contribute to the world together.</p>
            </header>

            <div class="view-toolbar" role="group" aria-label="Modo de exibição dos links">
                <span class="view-toolbar-label">Exibir</span>
                <button type="button" class="view-btn is-active" data-view="list" aria-pressed="true"
                    title="Visualização em lista">
                    <i class="fas fa-list" aria-hidden="true"></i>
                    <span>Lista</span>
                </button>
                <button type="button" class="view-btn" data-view="cards" aria-pressed="false"
                    title="Visualização em cards">
                    <i class="fas fa-grip" aria-hidden="true"></i>
                    <span>Cards</span>
                </button>
            </div>

            <nav class="links-container view-list" id="links-container" aria-label="Links sociais">
                <a href="https://mail.google.com/mail/?view=cm&fs=1&to=luannpmendes@gmail.com" class="data-body">
                    <div class="data-content">
                        <i class="fas fa-envelope svg-icon" aria-hidden="true"></i>
                        <p class="name-icon">Email</p>
                    </div>
                </a>
                <a href="https://github.com/Luann8" class="data-body">
                    <div class="data-content">
                        <i class="fab fa-github svg-icon" aria-hidden="true"></i>
                        <p class="name-icon">GitHub</p>
                    </div>
                </a>
                <a href="https://www.linkedin.com/in/luann-pereira-mendes-81706826a/" class="data-body">
                    <div class="data-content">
                        <i class="fab fa-linkedin svg-icon" aria-hidden="true"></i>
                        <p class="name-icon">LinkedIn</p>
                    </div>
                </a>
                <a href="https://luann8.github.io/Luann-portifolio/" class="data-body">
                    <div class="data-content">
                        <i class="fas fa-briefcase svg-icon" aria-hidden="true"></i>
                        <p class="name-icon">Portfólio</p>
                    </div>
                </a>
                <a href="https://www.credly.com/users/luann-pereira-mendes/edit#credly" class="data-body">
                    <div class="data-content">
                        <i class="fa-solid fa-address-card svg-icon" aria-hidden="true"></i>
                        <p class="name-icon">Credly</p>
                    </div>
                </a>
                <a href="https://music.youtube.com/playlist?list=PLzttvuce5_vUusXGjt_YY8X7vdAz2SyH4&si=zwK6KKnL5kYjTJyf"
                    class="data-body">
                    <div class="data-content">
                        <i class="fas fa-record-vinyl svg-icon" aria-hidden="true"></i>
                        <p class="name-icon">YouTube Music</p>
                    </div>
                </a>
                <a href="http://www.guiadosquadrinhos.com/titulos-da-colecao/luann-pereira-mendes/164694"
                    class="data-body">
                    <div class="data-content">
                        <i class="fas fa-book svg-icon" aria-hidden="true"></i>
                        <p class="name-icon">Guia dos Quadrinhos</p>
                    </div>
                </a>
            </nav>

            <footer class="footer-phrase">
                stay positive, stay educated stay safe
                <br>
                mikey hawdon
            </footer>
        </main>
    </div>

    <script>
        (function () {
            const STORAGE_KEY = 'linktree-view-mode';
            const container = document.getElementById('links-container');
            const buttons = document.querySelectorAll('.view-btn');

            function setView(mode) {
                const isList = mode === 'list';
                container.classList.toggle('view-list', isList);
                container.classList.toggle('view-cards', !isList);
                document.body.classList.toggle('view-mode-list', isList);
                document.body.classList.toggle('view-mode-cards', !isList);

                buttons.forEach((btn) => {
                    const active = btn.dataset.view === mode;
                    btn.classList.toggle('is-active', active);
                    btn.setAttribute('aria-pressed', String(active));
                });

                try {
                    localStorage.setItem(STORAGE_KEY, mode);
                } catch (_) { /* ignore */ }
            }

            buttons.forEach((btn) => {
                btn.addEventListener('click', () => setView(btn.dataset.view));
            });

            let saved = 'list';
            try {
                saved = localStorage.getItem(STORAGE_KEY) || 'list';
            } catch (_) { /* ignore */ }

            setView(saved === 'cards' ? 'cards' : 'list');
        })();
    </script>
</body>

</html>
